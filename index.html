<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagramme radial interactif</title>

  <style>
    @import url('https://fonts.cdnfonts.com/css/glacial-indifference-2');

    :root{
      --bg:#f4f7fb;
      --panel:#ffffff;
      --border:#d8e0eb;
      --text:#1f2937;
      --muted:#64748b;
      --accent:#2563eb;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Glacial Indifference', Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      display:grid;
      grid-template-columns:360px 1fr;
      min-height:100vh;
    }

    aside{
      background:#fff;
      border-right:1px solid var(--border);
      padding:18px;
    }

    h1{
      margin:0 0 8px;
      font-size:22px;
      font-weight:700;
    }

    p{
      margin:0 0 16px;
      color:var(--muted);
      font-size:15px;
      line-height:1.45;
    }

    .group{
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
      padding:14px;
      margin-bottom:14px;
    }

    .group h2{
      margin:0 0 12px;
      font-size:16px;
      font-weight:700;
    }

    .field{margin-bottom:12px}

    .field label{
      display:flex;
      justify-content:space-between;
      gap:8px;
      font-size:14px;
      margin-bottom:6px;
    }

    input[type="range"]{width:100%}

    input[type="color"]{
      width:100%;
      height:44px;
      border:1px solid var(--border);
      border-radius:10px;
      background:#fff;
      padding:4px;
      cursor:pointer;
    }

    .buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      border:0;
      border-radius:10px;
      padding:10px 12px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      background:var(--accent);
      color:#fff;
    }

    button.secondary{
      background:#e8eef8;
      color:#111827;
    }

    main{
      display:grid;
      place-items:center;
      padding:20px;
      overflow:auto;
    }

    .card{
      width:min(94vw, 1080px);
      aspect-ratio:1/1;
      background:#fff;
      border-radius:20px;
      box-shadow:0 12px 40px rgba(15,23,42,.08);
      padding:10px;
    }

    svg{
      width:100%;
      height:100%;
      display:block;
    }

    .note{
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
      line-height:1.4;
    }

    @media (max-width:920px){
      .app{grid-template-columns:1fr}
      aside{border-right:0;border-bottom:1px solid var(--border)}
      .card{width:min(96vw, 760px)}
    }
  </style>
</head>
<body>
<div class="app">
  <aside>
    <h1>Diagramme interactif</h1>
    <p>Version proche de ton Canva, avec 1080 × 1080 px et police Glacial Indifference.</p>

    <div class="group">
      <h2>Anneau extérieur</h2>
      <div class="field">
        <label for="outerColor"><span>Couleur du cercle extérieur</span></label>
        <input id="outerColor" type="color" value="#1f77d4">
      </div>
    </div>

    <div class="group">
      <h2>5 groupes intérieurs</h2>
      <div class="field"><label><span>Violet</span><span id="v1l">3</span></label><input id="v1" type="range" min="1" max="5" value="3" step="1"></div>
      <div class="field"><label><span>Vert</span><span id="v2l">3</span></label><input id="v2" type="range" min="1" max="5" value="3" step="1"></div>
      <div class="field"><label><span>Orange</span><span id="v3l">3</span></label><input id="v3" type="range" min="1" max="5" value="3" step="1"></div>
      <div class="field"><label><span>Rouge</span><span id="v4l">3</span></label><input id="v4" type="range" min="1" max="5" value="3" step="1"></div>
      <div class="field"><label><span>Rose</span><span id="v5l">3</span></label><input id="v5" type="range" min="1" max="5" value="3" step="1"></div>
    </div>

    <div class="group">
      <h2>Export</h2>
      <div class="buttons">
        <button id="downloadSvg">Télécharger SVG</button>
        <button class="secondary" id="copyConfig">Copier la config</button>
      </div>
      <div class="note">Le PNG pourra être ajouté ensuite avec une conversion SVG vers canvas.</div>
    </div>
  </aside>

  <main>
    <div class="card">
      <svg id="svg" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="outerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#57d5e7"/>
            <stop offset="100%" stop-color="#0c5db8"/>
          </linearGradient>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity=".10"/>
          </filter>
        </defs>
        <rect width="1080" height="1080" fill="#ffffff"/>
        <g id="root"></g>
      </svg>
    </div>
  </main>
</div>

<script>
const svg = document.getElementById('svg');
const root = document.getElementById('root');
const outerColor = document.getElementById('outerColor');

const sliders = [1,2,3,4,5].map(i => document.getElementById('v'+i));
const labels = [1,2,3,4,5].map(i => document.getElementById('v'+i+'l'));

const cx = 540, cy = 540;
const outerR = 490;
const outerInner = 398;
const centerHoleR = 104;
const innerMin = 190;
const innerMax = 350;

const colors = ['#8d65f4','#45c96d','#ffb24d','#ff6d4f','#ff64a9'];

function polar(r, a){
  return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
}

function add(name, attrs, parent=root){
  const el = document.createElementNS('http://www.w3.org/2000/svg', name);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  parent.appendChild(el);
  return el;
}

function annularPath(r1, r2, a0, a1){
  const p1 = polar(r2, a0), p2 = polar(r2, a1), p3 = polar(r1, a1), p4 = polar(r1, a0);
  const large = (a1 - a0) > Math.PI ? 1 : 0;
  return [
    `M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)}`,
    `A ${r2} ${r2} 0 ${large} 1 ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`,
    `L ${p3.x.toFixed(2)} ${p3.y.toFixed(2)}`,
    `A ${r1} ${r1} 0 ${large} 0 ${p4.x.toFixed(2)} ${p4.y.toFixed(2)}`,
    'Z'
  ].join(' ');
}

function valueToR(v){
  return innerMin + ((v - 1) / 4) * (innerMax - innerMin);
}

function textAt(x, y, text, size, color, weight=700, anchor='middle'){
  return add('text', {
    x, y,
    fill: color,
    'font-size': size,
    'font-weight': weight,
    'font-family': `'Glacial Indifference', Arial, sans-serif`,
    'text-anchor': anchor,
    'dominant-baseline': 'middle'
  }).textContent = text;
}

function textOnArc(text, radius, a0, a1, size, color, weight=700){
  const mid = (a0 + a1) / 2;
  const p = polar(radius, mid);
  const rot = mid * 180 / Math.PI + 90;
  return add('text', {
    x: p.x, y: p.y,
    fill: color,
    'font-size': size,
    'font-weight': weight,
    'font-family': `'Glacial Indifference', Arial, sans-serif`,
    'text-anchor': 'middle',
    'dominant-baseline': 'middle',
    transform: `rotate(${rot} ${p.x} ${p.y})`
  }).textContent = text;
}

function render(){
  root.innerHTML = '';
  const vals = sliders.map(s => Number(s.value));
  sliders.forEach((s, i) => labels[i].textContent = s.value);

  add('circle', {
    cx, cy, r: outerR,
    fill: 'url(#outerGrad)',
    filter: 'url(#shadow)'
  });

  const step = Math.PI * 2 / 5;
  const start = -Math.PI / 2;
  const trim = 0.018;

  const sectors = [
    { color: colors[0], texts: ['biomécanique', 'psycho-émotionnel', 'contexte'] },
    { color: colors[1], texts: ['Alliance thérapeutique', 'communication'] },
    { color: colors[2], texts: ['induction praticien', 'réactions patient', 'perceptions praticien'] },
    { color: colors[3], texts: ['construction d’hypothèses', 'intuition', 'interprétation'] },
    { color: colors[4], texts: ['visualisation', 'routines', 'disponibilité'] }
  ];

  for(let i=0;i<5;i++){
    const a0 = start + i * step + trim;
    const a1 = start + (i + 1) * step - trim;
    const r2 = valueToR(vals[i]);

    add('path', {
      d: annularPath(centerHoleR, r2, a0, a1),
      fill: sectors[i].color,
      stroke: '#ffffff',
      'stroke-width': 3
    });

    const mid = (a0 + a1) / 2;
    const baseR = (centerHoleR + r2) / 2;
    const texts = sectors[i].texts;

    if (texts.length === 2){
      textOnArc(texts[0], baseR + 18, a0, a1, 34, '#ffffff', 700);
      textOnArc(texts[1], baseR - 22, a0, a1, 28, '#ffffff', 600);
    } else if (texts.length === 3){
      textOnArc(texts[0], baseR + 30, a0, a1, 24, '#ffffff', 700);
      textOnArc(texts[1], baseR + 2, a0, a1, 24, '#ffffff', 600);
      textOnArc(texts[2], baseR - 26, a0, a1, 24, '#ffffff', 600);
    }
  }

  add('circle', {
    cx, cy, r: 165,
    fill: '#fff1ad',
    stroke: '#f0d46a',
    'stroke-width': 2
  });

  textAt(cx, cy - 14, 'Patient', 40, '#c38e65', 700);
  textAt(cx, cy + 22, 'Réagit au toucher', 24, '#c38e65', 700);

  textOnArc('identité professionnelle', 430, -2.50, -0.78, 34, '#ffffff', 500);
  textOnArc('auto-réflexivité', 430, 0.38, 1.28, 34, '#ffffff', 500);
  textOnArc('identité personnelle', 430, 2.62, 4.06, 34, '#ffffff', 500);

  textOnArc('PRATICIEN', 388, -1.92, -1.08, 42, '#3557ff', 800);
  textOnArc('Induit le toucher et perçoit les réactions du patient', 382, -2.38, -0.62, 20, '#3557ff', 700);
  textOnArc('PRATICIEN', 388, 1.10, 2.03, 42, '#3557ff', 800);
  textOnArc('Induit le toucher et perçoit les réactions du patient', 382, 0.64, 2.50, 20, '#3557ff', 700);

  add('circle', {
    cx, cy, r: outerInner,
    fill: 'none',
    stroke: '#ffffff',
    'stroke-width': 3
  });

  add('circle', {
    cx, cy, r: outerR,
    fill: 'none',
    stroke: '#ffffff',
    'stroke-width': 3
  });
}

function downloadSvg(){
  const clone = svg.cloneNode(true);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  const source = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([source], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'diagramme-canva-like.svg';
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('downloadSvg').addEventListener('click', downloadSvg);
document.getElementById('copyConfig').addEventListener('click', async () => {
  const config = {
    outerColor: outerColor.value,
    values: sliders.map(s => Number(s.value))
  };
  await navigator.clipboard.writeText(JSON.stringify(config, null, 2));
  alert('Configuration copiée.');
});

outerColor.addEventListener('input', () => {
  const grad = document.getElementById('outerGrad');
  grad.firstElementChild.setAttribute('stop-color', outerColor.value);
  render();
});

sliders.forEach(s => s.addEventListener('input', render));
render();
</script>
</body>
</html>
